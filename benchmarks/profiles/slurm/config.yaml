# Snakemake SLURM profile for HPC execution.
#
# Requires: snakemake-executor-plugin-slurm (pip install snakemake-executor-plugin-slurm)
#
# Usage (run from the benchmarks/ directory):
#   snakemake --profile profiles/slurm all
#   snakemake --profile profiles/slurm performance_all
#   snakemake --profile profiles/slurm capture_kit_all

executor: slurm

# No cap on concurrent jobs — use as many nodes as the scheduler allows.
# The scheduler will queue and allocate naturally.
jobs: 500

# Retry failed jobs once before giving up (e.g. transient I/O errors)
retries: 1

# Wait up to 60 s for output files to appear after a job completes
# (accounts for NFS/Lustre latency)
latency-wait: 60

# ---------------------------------------------------------------------------
# Default resources applied to every rule unless overridden
# ---------------------------------------------------------------------------
default-resources:
  slurm_partition: normal
  cpus_per_task: 4
  mem_mb: 16000
  runtime: 60          # minutes

# ---------------------------------------------------------------------------
# Per-rule resource overrides
# ---------------------------------------------------------------------------
set-resources:
  # 1KG download — network + parallel split (single node)
  download_1kg:
    cpus_per_task: 32
    mem_mb: 8000
    runtime: 180
    slurm_extra: "--nodes=1"

  # Database prepare — builds multiple DBs sequentially per benchmark
  performance_prepare:
    cpus_per_task: 52
    mem_mb: 64000
    runtime: 480
    slurm_extra: "--nodes=1"

  # Query scaling — light single-threaded measurement
  performance_query_scaling:
    cpus_per_task: 1
    mem_mb: 16000
    runtime: 120

  # Build performance experiment — sweeps over thread counts
  performance_build_perf:
    cpus_per_task: 52
    mem_mb: 128000
    runtime: 600
    slurm_extra: "--nodes=1"

  # Annotation throughput — sweeps over thread counts
  performance_annotate:
    cpus_per_task: 52
    mem_mb: 32000
    runtime: 120
    slurm_extra: "--nodes=1"

  # bcftools comparison — light single-threaded
  performance_bcftools:
    cpus_per_task: 1
    mem_mb: 16000
    runtime: 60

  # Capture kit: prepare (split + mask per-sample VCFs)
  capture_kit_prepare:
    cpus_per_task: 52
    mem_mb: 16000
    runtime: 180
    slurm_extra: "--nodes=1"

  # Capture kit: build 4 databases
  capture_kit_build:
    cpus_per_task: 52
    mem_mb: 128000
    runtime: 480
    slurm_extra: "--nodes=1"

  # Capture kit: compute NADI / AF error metrics (pandas, pyranges)
  capture_kit_metrics:
    cpus_per_task: 4
    mem_mb: 64000
    runtime: 60

  # Capture kit: ACMG classification
  capture_kit_acmg:
    cpus_per_task: 1
    mem_mb: 8000
    runtime: 15

  # Plotting rules — lightweight
  performance_plot:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 15

  capture_kit_plot:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 15
