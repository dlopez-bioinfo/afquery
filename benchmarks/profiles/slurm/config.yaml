# Snakemake SLURM profile for HPC execution.
#
# Requires: snakemake-executor-plugin-slurm (pip install snakemake-executor-plugin-slurm)
#
# Usage (run from the benchmarks/ directory):
#   snakemake --profile profiles/slurm all
#   snakemake --profile profiles/slurm performance_all
#   snakemake --profile profiles/slurm capture_kit_all

executor: slurm

# No cap on concurrent jobs — use as many nodes as the scheduler allows.
# The scheduler will queue and allocate naturally.
jobs: 500

# Retry failed jobs once before giving up (e.g. transient I/O errors)
retries: 1

# Wait up to 60 s for output files to appear after a job completes
# (accounts for NFS/Lustre latency)
latency-wait: 60

# ---------------------------------------------------------------------------
# Default resources applied to every rule unless overridden
# ---------------------------------------------------------------------------
default-resources:
  slurm_partition: normal
  cpus_per_task: 4
  mem_mb: 16000
  runtime: 60          # minutes

# ---------------------------------------------------------------------------
# Per-rule resource overrides
# ---------------------------------------------------------------------------
set-resources:
  # 1KG download — network + parallel split (single node)
  download_1kg:
    cpus_per_task: 32
    mem_mb: 8000
    runtime: 180
    nodes: 1

  # --- Performance: prepare (one job per DB, all parallel) ---
  performance_prepare_1kg:
    cpus_per_task: 52
    mem_mb: 32000
    runtime: 120
    nodes: 1

  performance_prepare_synth:
    cpus_per_task: 52
    mem_mb: 32000
    runtime: 120
    nodes: 1

  performance_data_inventory:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 5

  # --- Performance: query scaling (one job per scale) ---
  performance_query_scaling_one:
    cpus_per_task: 1
    mem_mb: 16000
    runtime: 30

  performance_query_scaling_collect:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 5

  # --- Performance: build experiment (gen + 15 parallel builds) ---
  performance_build_synth_gen:
    cpus_per_task: 1
    mem_mb: 8000
    runtime: 30

  performance_build_one:
    # cpus_per_task is set dynamically via threads: lambda wc: int(wc.t)
    # mem_mb is set dynamically via lambda: threads * 4000
    # SLURM floor values used when lambda is not overriding:
    mem_mb: 8000
    runtime: 120
    nodes: 1

  performance_build_collect:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 5

  # --- Performance: annotate (15 parallel runs) ---
  performance_annotate_one:
    # cpus_per_task set dynamically via threads: lambda wc: int(wc.t)
    mem_mb: 8000
    runtime: 30
    nodes: 1

  performance_annotate_collect:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 5

  # --- Performance: bcftools comparison (3 parallel + 1 concordance) ---
  performance_bcftools_one:
    cpus_per_task: 1
    mem_mb: 16000
    runtime: 60

  performance_bcftools_concordance:
    cpus_per_task: 1
    mem_mb: 16000
    runtime: 30

  performance_bcftools_collect:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 5

  # --- Performance: plot ---
  performance_plot:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 15

  # --- Capture kit: prepare (split + mask per-sample VCFs) ---
  capture_kit_prepare:
    cpus_per_task: 52
    mem_mb: 16000
    runtime: 180
    nodes: 1

  # --- Capture kit: build (one job per scenario, all parallel) ---
  capture_kit_build_one:
    cpus_per_task: 52
    mem_mb: 64000
    runtime: 120
    nodes: 1

  capture_kit_build_all:
    cpus_per_task: 1
    mem_mb: 1000
    runtime: 1

  # --- Capture kit: downstream (unchanged) ---
  capture_kit_metrics:
    cpus_per_task: 4
    mem_mb: 64000
    runtime: 60

  capture_kit_acmg:
    cpus_per_task: 1
    mem_mb: 8000
    runtime: 15

  capture_kit_plot:
    cpus_per_task: 1
    mem_mb: 4000
    runtime: 15
